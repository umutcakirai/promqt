<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Promqt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      max-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      overflow: hidden;
    }
    .header {
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
    }
    .logo { font-size: 20px; font-weight: 900; letter-spacing: -0.04em; color: #001227; }

    /* Tabs */
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #e2e8f0; }
    .tab {
      flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600;
      color: #64748b; cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.12s; background: none; border-top: none; border-left: none; border-right: none;
      font-family: inherit;
    }
    .tab:hover { color: #0f172a; }
    .tab.active { color: #006bec; border-bottom-color: #006bec; }

    .panel { display: none; padding: 16px 18px; overflow-y: auto; max-height: 420px; }
    .panel.active { display: block; }

    /* Settings */
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: #475569; margin-bottom: 4px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field select, .field input {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; outline: none;
      font-family: inherit; background: #fff; color: #0f172a;
    }
    .field select:focus, .field input:focus { border-color: #006bec; }
    .key-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .key-hint a { color: #006bec; text-decoration: none; }
    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .save-btn, .test-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .save-btn { background: #001227; color: #fff; }
    .save-btn:hover { background: #002451; }
    .test-btn { background: #fff; color: #001227; border: 1.5px solid #e2e8f0; }
    .test-btn:hover { border-color: #006bec; color: #006bec; }
    .test-btn:disabled { opacity: 0.5; pointer-events: none; }
    .status {
      text-align: center; font-size: 12px; font-weight: 600;
      margin-top: 8px; min-height: 18px; line-height: 1.4;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #ef4444; }
    .status.testing { color: #006bec; }

    /* History */
    .history-empty {
      text-align: center; color: #94a3b8; font-size: 13px; padding: 32px 0;
    }
    .history-item {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
      transition: border-color 0.12s;
    }
    .history-item:hover { border-color: #006bec; }
    .history-input {
      font-size: 13px; font-weight: 600; color: #0f172a;
      margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-meta {
      font-size: 10px; color: #94a3b8; display: flex; gap: 8px;
    }
    .history-prompts { display: none; margin-top: 8px; }
    .history-item.expanded .history-prompts { display: block; }
    .history-prompt {
      background: #f8fafc; border-radius: 6px; padding: 8px 10px;
      margin-bottom: 6px; font-size: 12px; line-height: 1.5; color: #334155;
      position: relative; cursor: text;
    }
    .history-prompt-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #006bec; margin-bottom: 2px;
    }
    .history-prompt-text {
      white-space: pre-wrap; word-break: break-word; max-height: 80px; overflow: hidden;
    }
    .history-copy {
      position: absolute; top: 6px; right: 6px;
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 4px; border: 1px solid #e2e8f0; background: #fff;
      color: #475569; cursor: pointer; font-family: inherit;
    }
    .history-copy:hover { background: #006bec; color: #fff; border-color: #006bec; }
    .clear-btn {
      width: 100%; padding: 8px; border: 1.5px solid #fee2e2; border-radius: 8px;
      background: #fff; color: #ef4444; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 8px;
    }
    .clear-btn:hover { background: #fef2f2; }

    .info-box {
      font-size: 12px; color: #64748b; line-height: 1.5;
      background: #f1f5f9; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
    }
    .info-box kbd {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 3px;
      padding: 0 4px; font-size: 11px; font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 680 140" fill="#2d3436" height="22" width="107"><path d="M0 40h28v8c6-8 16-14 30-14 24 0 42 20 42 44s-18 44-42 44c-13 0-23-5-30-13v36H0V40zm28 38c0 16 10 26 24 26s24-10 24-26-10-26-24-26-24 10-24 26z"/><path d="M118 40h28v18c5-13 15-20 28-20h4v28h-8c-16 0-24 7-24 22v32h-28V40z"/><path d="M224 34c28 0 46 20 46 44s-18 44-46 44-46-20-46-44 18-44 46-44zm0 62c12 0 20-8 20-18s-8-18-20-18-20 8-20 18 8 18 20 18z"/><path d="M288 40h28v10c6-8 14-14 26-14s21 5 26 14c7-9 17-14 29-14 20 0 32 13 32 36v48h-28V76c0-12-5-18-15-18s-16 7-16 20v42h-28V76c0-12-5-18-15-18s-16 7-16 20v42h-28V40z"/><path d="M486 34c26 0 44 20 44 44 0 23-16 42-40 44l-4 0-10 16c-2 3-4 2-5-1l-5-13c-17-6-29-22-29-42 0-26 21-48 49-48zm2 62c12 0 20-8 20-18s-8-18-20-18-20 8-20 18 8 18 20 18z"/><path d="M556 10h28v30h20v22h-20v34c0 8 3 12 10 12h10v18h-16c-20 0-32-10-32-30V62h-14V40h14V10z"/></svg>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="history">History</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- History Panel -->
  <div class="panel active" id="panel-history">
    <div id="history-list"></div>
  </div>

  <!-- Settings Panel -->
  <div class="panel" id="panel-settings">
    <div class="info-box">
      Select text on any page, then:<br>
      <kbd>Ctrl</kbd>+<kbd>C</kbd> <kbd>C</kbd> &nbsp;|&nbsp; Right-click → Promqt &nbsp;|&nbsp; Click ✦
    </div>
    <div class="field">
      <label>Provider</label>
      <select id="provider">
        <option value="">Select provider...</option>
        <option value="openai">OpenAI</option>
        <option value="gemini">Google Gemini</option>
        <option value="claude">Anthropic Claude</option>
      </select>
    </div>
    <div class="field">
      <label>Model</label>
      <select id="model">
        <option value="">Select provider first...</option>
      </select>
    </div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="Paste your API key">
      <div class="key-hint" id="keyHint"></div>
    </div>
    <div class="btn-row">
      <button class="test-btn" id="test">Test Connection</button>
      <button class="save-btn" id="save">Save</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
